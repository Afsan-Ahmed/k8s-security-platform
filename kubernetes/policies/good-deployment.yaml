apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-good
  labels:
    app: nginx
    owner: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        owner: platform-team
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
