name: Security Scan Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  trivy-scan:
     name: Trivy scanner for Images
     runs-on: ubuntu-latest

   
     steps:
       - name: Checkout code
         uses: actions/checkout@v4

       - name: Configure Aws Credentials
         uses: aws-actions/configure-aws-credentials@v4
         with:
           aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
           aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
           aws-region: ap-northeast-2


       - name: login to AWS ECR 
         uses: aws-actions/amazon-ecr-login@v2

       - name: Pull image from ecr
         run: |
           docker pull 342934375778.dkr.ecr.ap-northeast-2.amazonaws.com/namespace/security-platform:latest

       - name: Trivy Security Scan
         uses: aquasecurity/trivy-action@master
         with:
           image-ref: "342934375778.dkr.ecr.ap-northeast-2.amazonaws.com/namespace/security-platform:latest"
           format: "table"
           exit-code: "0" 
           severity: "CRITICAL,HIGH"

       - name: Generate The trivy scan report
         uses: aquasecurity/trivy-action@master
         with:
           image-ref: "342934375778.dkr.ecr.ap-northeast-2.amazonaws.com/namespace/security-platform:latest"
           format: "sarif"
           output: "trivy-results.sarif"

       - name: Upload SARIF Report 
         uses: github/codeql-action/upload-sarif@v3 
         with: 
           sarif_file: trivy-results.sarif
    
   
  kyverno-policy-check:
    name: validate kyverno check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 

      - name: install kyverno CLI
        uses: kyverno/action-install-cli@v0.2.0

      - name: Check Version
        run: kyverno version

      - name: Validate Policies
        run: |
          kyverno apply kubernetes/policies/*.yaml

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [trivy-scan, kyverno-policy-check]
    if: always()

    steps:
      - name: Print Security Summary
        run: |
          echo "================================"
          echo "  SECURITY SCAN COMPLETE"
          echo "================================"
          echo "Trivy image scan completed"
          echo "Kyverno policies validated"
          echo "================================"




















